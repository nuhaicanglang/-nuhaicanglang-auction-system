# 监听所有地址，方便宿主机访问容器内 Redis。
bind 0.0.0.0
# 开发环境关闭保护模式，生产环境需要重新开启并设置密码。
protected-mode no
port 6379
timeout 0
tcp-keepalive 300

# RDB 持久化策略：在不同时间窗口内达到指定写入次数时保存快照。
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# 限制开发环境 Redis 最大内存，超过后按 LRU 淘汰不常用 key。
maxmemory 256mb
maxmemory-policy allkeys-lru
appendonly no
