server:
  tomcat:
    threads:
      max: 200
      min-spare: 20
    accept-count: 100

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/auction?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root123456
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 5000
      idle-timeout: 300000
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      lettuce:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 8
          max-wait: 3000ms
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin123
    # 发布确认：correlated 模式，异步回调确认每条消息是否到达交换机
    publisher-confirm-type: correlated
    # 消息无法路由到队列时回退给发送方
    publisher-returns: true
    listener:
      simple:
        # 手动 ack：消费者处理完毕后显式确认，避免消息丢失
        acknowledge-mode: manual
        # 每次只拉取 1 条消息，处理完再拉下一条（防止消费者积压）
        prefetch: 1
        # 消费失败重试
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
  elasticsearch:
    uris: http://localhost:9200

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 30MB

storage:
  type: local
  local-path: ./uploads
  local-url-prefix: /uploads

logging:
  level:
    com.auction: debug

auction:
  jwt:
    # 开发环境 JWT 密钥，长度需要足够支持 HS256；生产环境不要直接写在配置文件中。
    secret: auction-dev-jwt-secret-key-please-change-in-production-2026
    # token 有效期，单位秒；当前设置为 2 小时。
    expire-seconds: 7200
